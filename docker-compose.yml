services:
  postgres:
    image: postgres:15-alpine
    container_name: pha_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pha_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: pha_backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pha_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pha_db}?schema=public
      UPLOAD_DIR: /app/uploads
    expose:
      - "3000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: pha_caddy
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:
